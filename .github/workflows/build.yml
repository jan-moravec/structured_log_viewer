name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  QT_VERSION: "6.8.*"
  APP_NAME: "StructuredLogViewer"

jobs:
  pre-commit:
    # Fails fast on formatting / lint issues before any expensive build runs.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color=always

  build-linux:
    needs: pre-commit
    # Pinned to the oldest supported runner so the AppImage links against an
    # older glibc and stays compatible with Ubuntu 22.04 / equivalent distros.
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      EXTRA_PLATFORM_PLUGINS: "libqwayland-generic.so;libqwayland-egl.so"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install newer GCC
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"
          cache: true

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y libfuse2 xvfb libxcb-cursor0 zsync

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Run unit tests
        # ctest preset already sets QT_QPA_PLATFORM=offscreen.
        run: ctest --preset release

      - name: Install linuxdeploy and plugin
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Package application
        env:
          # Enables delta/zsync updates: linuxdeploy embeds this entry into the
          # AppImage and writes a sibling .zsync file. See:
          # https://docs.appimage.org/packaging-guide/optional/updates.html
          UPDATE_INFORMATION: "gh-releases-zsync|${{ github.repository_owner }}|${{ github.event.repository.name }}|latest|${{ env.APP_NAME }}-*x86_64.AppImage.zsync"
        run: |
          APP_DIR="${{ env.APP_NAME }}.AppDir"
          mkdir -p $APP_DIR/usr/bin
          mkdir -p $APP_DIR/usr/lib
          mkdir -p $APP_DIR/usr/share/applications
          mkdir -p $APP_DIR/usr/share/icons/hicolor/256x256/apps
          cp build/release/bin/Release/${{ env.APP_NAME }} $APP_DIR/usr/bin/
          cp -r build/release/bin/Release/tzdata $APP_DIR/usr/share/
          cp resources/icon-white.png $APP_DIR/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png
          cp resources/app.desktop $APP_DIR/usr/share/applications/${{ env.APP_NAME }}.desktop
          ./linuxdeploy-x86_64.AppImage --appdir=$APP_DIR --plugin qt --output appimage

      - name: Compute SHA256 checksums
        run: |
          shopt -s nullglob
          for file in ${{ env.APP_NAME }}-*.AppImage ${{ env.APP_NAME }}-*.AppImage.zsync; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.APP_NAME }}-linux
          path: |
            ${{ env.APP_NAME }}-*.AppImage
            ${{ env.APP_NAME }}-*.AppImage.zsync
            ${{ env.APP_NAME }}-*.AppImage.sha256
            ${{ env.APP_NAME }}-*.AppImage.zsync.sha256
          if-no-files-found: error

      - name: Release binaries
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.APP_NAME }}-*.AppImage
            ${{ env.APP_NAME }}-*.AppImage.zsync
            ${{ env.APP_NAME }}-*.AppImage.sha256
            ${{ env.APP_NAME }}-*.AppImage.zsync.sha256

  build-windows:
    needs: pre-commit
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          cache: true

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          cmake --preset release

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          cmake --build --preset release

      - name: Run unit tests
        # ctest preset already sets QT_QPA_PLATFORM=offscreen.
        shell: cmd
        run: ctest --preset release

      - name: Package application
        shell: powershell
        run: |
          mkdir ${{ env.APP_NAME }}
          cd ${{ env.APP_NAME }}
          mv ../build/release/bin/Release/${{ env.APP_NAME }}.exe .
          mv ../build/release/bin/Release/tzdata .
          # Carry oneTBB's runtime DLL alongside the executable. The CMake
          # POST_BUILD rule in app/CMakeLists.txt already copies it next to
          # StructuredLogViewer.exe, so the file is present in the build tree.
          Move-Item ../build/release/bin/Release/tbb*.dll .
          windeployqt --release ${{ env.APP_NAME }}.exe
          Compress-Archive -Path . -DestinationPath ../${{ env.APP_NAME }}.zip

      - name: Smoke-test packaged binary
        # Launches the packaged executable headlessly so a missing tbb12.dll
        # (STATUS_DLL_NOT_FOUND, 0xc0000135) fails CI before we ship a broken zip.
        shell: powershell
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $exe = "${{ env.APP_NAME }}\${{ env.APP_NAME }}.exe"
          $p = Start-Process -FilePath $exe -PassThru -NoNewWindow
          Start-Sleep -Seconds 5
          if ($p.HasExited) {
            Write-Error "Packaged binary exited prematurely with code $($p.ExitCode) (STATUS_DLL_NOT_FOUND = -1073741515 / 0xc0000135)"
            exit 1
          }
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          Write-Host "Packaged binary started successfully and was terminated after 5s."

      - name: Compute SHA256 checksums
        shell: powershell
        run: |
          $file = "${{ env.APP_NAME }}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
          "$hash  $file" | Out-File -FilePath "$file.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.APP_NAME }}-windows
          path: |
            ${{ env.APP_NAME }}.zip
            ${{ env.APP_NAME }}.zip.sha256
          if-no-files-found: error

      - name: Release binaries
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.APP_NAME }}.zip
            ${{ env.APP_NAME }}.zip.sha256

  build-macos:
    needs: pre-commit
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: "mac"
          target: "desktop"
          arch: "clang_64"
          cache: true

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Run unit tests
        # ctest preset already sets QT_QPA_PLATFORM=offscreen.
        run: ctest --preset release

      - name: Package application
        run: |
          cd build/release/bin/Release
          # tzdata is copied into the bundle's Contents/Resources by the CMake
          # POST_BUILD step; verify it's there before deploying.
          if [ ! -d "${{ env.APP_NAME }}.app/Contents/Resources/tzdata" ]; then
            echo "ERROR: tzdata missing from bundle Resources" >&2
            exit 1
          fi
          macdeployqt ${{ env.APP_NAME }}.app -dmg
          mv ${{ env.APP_NAME }}.dmg "$GITHUB_WORKSPACE/${{ env.APP_NAME }}.dmg"

      - name: Compute SHA256 checksums
        run: shasum -a 256 ${{ env.APP_NAME }}.dmg > ${{ env.APP_NAME }}.dmg.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.APP_NAME }}-macos
          path: |
            ${{ env.APP_NAME }}.dmg
            ${{ env.APP_NAME }}.dmg.sha256
          if-no-files-found: error

      - name: Release binaries
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.APP_NAME }}.dmg
            ${{ env.APP_NAME }}.dmg.sha256
